---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: kapetools.kape.io
spec:
  group: kape.io
  names:
    categories:
    - kape
    kind: KapeTool
    listKind: KapeToolList
    plural: kapetools
    singular: kapetool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KapeTool registers a tool capability — either an MCP server sidecar, a vector memory backend,
          or an event-publish contract. The operator reads KapeTool CRDs to provision infrastructure
          for handler pods.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KapeToolSpec defines the desired state of a KapeTool.
            properties:
              description:
                description: Description is an optional human-readable description
                  of this tool.
                type: string
              eventPublish:
                description: EventPublish defines configuration for an event-publish
                  contract tool.
                properties:
                  source:
                    description: Source is the optional CloudEvent source URI.
                    type: string
                  type:
                    description: Type is the CloudEvent type for events published
                      by this tool.
                    minLength: 1
                    type: string
                required:
                - type
                type: object
              mcp:
                description: MCP defines configuration for an MCP server sidecar tool.
                properties:
                  allowedTools:
                    description: AllowedTools is an allowlist of MCP tool names to
                      expose.
                    items:
                      type: string
                    type: array
                  audit:
                    description: Audit defines audit logging configuration.
                    properties:
                      enabled:
                        default: true
                        description: Enabled controls per-call audit logging. Defaults
                          to true. Always true in v1.
                        type: boolean
                    type: object
                  deniedTools:
                    description: DeniedTools is a denylist of MCP tool names to block.
                    items:
                      type: string
                    type: array
                  redaction:
                    description: Redaction defines field-level redaction rules for
                      tool call I/O.
                    properties:
                      input:
                        description: Input is the list of JSONPath rules applied to
                          tool call inputs.
                        items:
                          description: JSONPathRule defines a JSONPath-based redaction
                            rule.
                          properties:
                            jsonPath:
                              description: JSONPath is the JSONPath expression identifying
                                the field to redact.
                              type: string
                          required:
                          - jsonPath
                          type: object
                        type: array
                      output:
                        description: Output is the list of JSONPath rules applied
                          to tool call outputs.
                        items:
                          description: JSONPathRule defines a JSONPath-based redaction
                            rule.
                          properties:
                            jsonPath:
                              description: JSONPath is the JSONPath expression identifying
                                the field to redact.
                              type: string
                          required:
                          - jsonPath
                          type: object
                        type: array
                    type: object
                  upstream:
                    description: Upstream defines the MCP server connection details.
                    properties:
                      transport:
                        description: Transport is the MCP transport protocol.
                        enum:
                        - sse
                        - streamable-http
                        type: string
                      url:
                        description: URL is the upstream MCP server URL.
                        minLength: 1
                        type: string
                    required:
                    - transport
                    - url
                    type: object
                required:
                - upstream
                type: object
              memory:
                description: Memory defines configuration for a vector memory backend
                  tool.
                properties:
                  backend:
                    description: Backend is the vector memory backend type.
                    enum:
                    - qdrant
                    - pgvector
                    - weaviate
                    type: string
                  distanceMetric:
                    description: DistanceMetric is the distance function used for
                      vector similarity search.
                    enum:
                    - cosine
                    - dot
                    - euclidean
                    type: string
                required:
                - backend
                - distanceMetric
                type: object
              type:
                description: Type is the tool capability category.
                enum:
                - mcp
                - memory
                - event-publish
                type: string
            required:
            - type
            type: object
            x-kubernetes-validations:
            - message: 'spec.memory.backend must be one of: qdrant, pgvector, weaviate'
              rule: self.type != 'memory' || (has(self.memory) && self.memory.backend
                in ['qdrant', 'pgvector', 'weaviate'])
            - message: 'spec.memory.distanceMetric must be one of: cosine, dot, euclidean'
              rule: self.type != 'memory' || (has(self.memory) && self.memory.distanceMetric
                in ['cosine', 'dot', 'euclidean'])
            - message: spec.eventPublish.type must start with 'kape.events.'
              rule: self.type != 'event-publish' || (has(self.eventPublish) && self.eventPublish.type.startsWith('kape.events.'))
            - message: 'spec.mcp: allowedTools and deniedTools cannot both be set'
              rule: '!(self.type == ''mcp'' && has(self.mcp) && size(self.mcp.allowedTools)
                > 0 && has(self.mcp.deniedTools) && size(self.mcp.deniedTools) > 0)'
          status:
            description: KapeToolStatus defines the observed state of a KapeTool.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the tool's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
