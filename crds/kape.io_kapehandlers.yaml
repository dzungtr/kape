    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KapeHandler is the primary CRD — one KapeHandler = one agent
          pipeline.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KapeHandlerSpec defines the desired state of a KapeHandler.
            properties:
              actions:
                description: Actions is the list of post-decision actions the agent
                  may execute.
                items:
                  description: ActionSpec defines a deterministic post-decision action.
                  properties:
                    condition:
                      description: Condition is a CEL expression that must evaluate
                        to true for this action to execute.
                      minLength: 1
                      type: string
                    data:
                      additionalProperties:
                        x-kubernetes-preserve-unknown-fields: true
                      description: Data holds arbitrary action-specific configuration.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    name:
                      description: Name is a unique identifier for this action.
                      minLength: 1
                      type: string
                    type:
                      description: Type specifies the action implementation.
                      enum:
                      - event-emitter
                      - save-memory
                      - webhook
                      type: string
                  required:
                  - condition
                  - data
                  - name
                  - type
                  type: object
                type: array
              dryRun:
                default: false
                description: DryRun disables actual action execution; the agent runs
                  but actions are no-ops.
                type: boolean
              envs:
                description: Envs is a list of additional environment variables injected
                  into the handler pod.
                items:
                  description: EnvVar represents an environment variable present in
                    a Container.
                  properties:
                    name:
                      description: Name of the environment variable. Must be a C_IDENTIFIER.
                      type: string
                    value:
                      description: |-
                        Variable references $(VAR_NAME) are expanded
                        using the previously defined environment variables in the container and
                        any service environment variables. If a variable cannot be resolved,
                        the reference in the input string will be unchanged. Double $$ are reduced
                        to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                        "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                        Escaped references will never be expanded, regardless of whether the variable
                        exists or not.
                        Defaults to "".
                      type: string
                    valueFrom:
                      description: Source for the environment variable's value. Cannot
                        be used if value is not empty.
                      properties:
                        configMapKeyRef:
                          description: Selects a key of a ConfigMap.
                          properties:
                            key:
                              description: The key to select.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap or its key
                                must be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        fieldRef:
                          description: |-
                            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                          properties:
                            apiVersion:
                              description: Version of the schema the FieldPath is
                                written in terms of, defaults to "v1".
                              type: string
                            fieldPath:
                              description: Path of the field to select in the specified
                                API version.
                              type: string
                          required:
                          - fieldPath
                          type: object
                          x-kubernetes-map-type: atomic
                        resourceFieldRef:
                          description: |-
                            Selects a resource of the container: only resources limits and requests
                            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                          properties:
                            containerName:
                              description: 'Container name: required for volumes,
                                optional for env vars'
                              type: string
                            divisor:
                              anyOf:
                              - type: integer
                              - type: string
                              description: Specifies the output format of the exposed
                                resources, defaults to "1"
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            resource:
                              description: 'Required: resource to select'
                              type: string
                          required:
                          - resource
                          type: object
                          x-kubernetes-map-type: atomic
                        secretKeyRef:
                          description: Selects a key of a secret in the pod's namespace
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                  required:
                  - name
                  type: object
                type: array
              llm:
                description: LLM defines the language model configuration for the
                  agent.
                properties:
                  confidenceThreshold:
                    description: |-
                      ConfidenceThreshold is the minimum confidence score required before executing actions.
                      Must be 0.0 (unset) or between 0.6 and 1.0.
                    maximum: 1
                    minimum: 0
                    type: number
                  maxIterations:
                    default: 50
                    description: MaxIterations is the maximum number of ReAct loop
                      iterations.
                    format: int32
                    minimum: 1
                    type: integer
                  model:
                    description: Model is the LLM model identifier.
                    minLength: 1
                    type: string
                  provider:
                    description: Provider is the LLM provider name (e.g. "openai",
                      "anthropic").
                    minLength: 1
                    type: string
                  systemPrompt:
                    description: SystemPrompt is the system-level instruction for
                      the agent.
                    minLength: 1
                    type: string
                required:
                - model
                - provider
                - systemPrompt
                type: object
              scaling:
                description: Scaling defines the autoscaling configuration for the
                  handler.
                properties:
                  maxReplicas:
                    default: 10
                    description: MaxReplicas is the maximum number of handler replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  minReplicas:
                    default: 1
                    description: MinReplicas is the minimum number of handler replicas.
                    format: int32
                    minimum: 0
                    type: integer
                  natsLagThreshold:
                    default: 5
                    description: NatsLagThreshold is the NATS consumer lag that triggers
                      a scale-up event.
                    format: int32
                    minimum: 1
                    type: integer
                  scaleDownStabilizationSeconds:
                    default: 60
                    description: ScaleDownStabilizationSeconds is the period to wait
                      before scaling down.
                    format: int32
                    minimum: 0
                    type: integer
                  scaleToZero:
                    default: false
                    description: ScaleToZero enables scaling the handler down to zero
                      replicas when idle.
                    type: boolean
                type: object
              schemaRef:
                description: SchemaRef is the name of the schema resource that describes
                  event payloads.
                minLength: 1
                type: string
              tools:
                description: Tools is the list of tools available to the agent.
                items:
                  description: ToolRef references a tool available to the agent.
                  properties:
                    ref:
                      description: Ref is the name or identifier of the tool.
                      minLength: 1
                      type: string
                  required:
                  - ref
                  type: object
                type: array
              trigger:
                description: Trigger defines the event source this handler subscribes
                  to.
                properties:
                  dedup:
                    description: Dedup is optional deduplication configuration.
                    properties:
                      key:
                        description: Key is the event field used to identify duplicate
                          events.
                        minLength: 1
                        type: string
                      windowSeconds:
                        description: WindowSeconds is the time window in seconds within
                          which duplicate events are suppressed.
                        format: int64
                        minimum: 1
                        type: integer
                    required:
                    - key
                    - windowSeconds
                    type: object
                  filter:
                    description: Filter is an optional event filter based on JSONPath
                      expression.
                    properties:
                      jsonpath:
                        description: Jsonpath is the JSONPath expression to evaluate.
                        minLength: 1
                        type: string
                      matches:
                        description: Matches is the expected value the JSONPath expression
                          must match.
                        minLength: 1
                        type: string
                    required:
                    - jsonpath
                    - matches
                    type: object
                  maxEventAgeSeconds:
                    default: 300
                    description: MaxEventAgeSeconds is the maximum age of events to
                      process, in seconds.
                    format: int64
                    minimum: 0
                    type: integer
                  replayOnStartup:
                    default: true
                    description: ReplayOnStartup controls whether events are replayed
                      on handler startup.
                    type: boolean
                  source:
                    description: Source is the NATS subject or event source identifier.
                    minLength: 1
                    type: string
                  type:
                    description: Type is the event type to subscribe to.
                    minLength: 1
                    type: string
                required:
                - source
                - type
                type: object
            required:
