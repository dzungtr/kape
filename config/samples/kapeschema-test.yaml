apiVersion: kape.io/v1alpha1
kind: KapeSchema
metadata:
  name: alert-decision-schema
  namespace: kape-system
spec:
  version: v1
  jsonSchema:
    type: object
    required:
      - decision
      - confidence
      - reasoning
    properties:
      decision:
        type: string
        enum: ["ignore", "investigate", "remediate"]
      confidence:
        type: number
        minimum: 0
        maximum: 1
      reasoning:
        type: string
        minLength: 10
